<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunicados Builder - Mundivox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f7fa;font-size:13px}

.app{min-height:100vh;display:flex;flex-direction:column}
.hdr{background:#2E5090;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px}
.hdr-logo{font-size:11px;font-weight:800;background:#4A90E2;padding:4px 10px;border-radius:4px}
.hdr-t{font-size:13px;font-weight:700}
.hdr-s{font-size:10px;color:rgba(255,255,255,.45)}
.hdr-r{margin-left:auto;display:flex;gap:8px}
.main{display:flex;flex:1}
.sidebar{width:260px;background:#fff;border-right:1px solid #e5e7eb;padding:14px;overflow-y:auto;max-height:calc(100vh - 48px);display:flex;flex-direction:column;gap:10px}
.sec-label{font-size:9px;font-weight:700;letter-spacing:.8px;color:#7a8c99;text-transform:uppercase;margin-bottom:6px}
.content{flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:8px 16px;font-size:9px;color:#7a8c99}
.topbar b{color:#1f2937}
.canvas{flex:1;overflow-y:auto;padding:24px;display:flex;justify-content:center}

.btn{border:none;border-radius:4px;padding:6px 12px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s}
.btn-primary{background:#4A90E2;color:#fff}.btn-primary:hover{background:#2E5090}
.btn-secondary{background:#e5e7eb;color:#7a8c99}.btn-secondary:hover{background:#d1d5db}
.btn-sm{padding:3px 8px;font-size:9px}
.btn-danger{background:#fee2e2;color:#dc2626;border:none;padding:3px 8px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer}
.hdr-btn{background:#4A90E2;border:none;color:#fff;padding:6px 14px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer}
.hdr-btn:hover{background:#2E5090}

.bloco-btn{padding:7px 10px;border:1px solid #e5e7eb;border-radius:5px;background:#fafbfc;font-size:10px;font-weight:600;color:#1f2937;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all .1s}
.bloco-btn:hover{border-color:#4A90E2;background:#f0f4ff}
.bloco-btn svg{flex-shrink:0;overflow:visible}

.com-item{padding:8px;border:1px solid #e5e7eb;border-radius:4px;background:#fafbfc;cursor:pointer;margin-bottom:4px}
.com-item.active{border:2px solid #4A90E2;background:#e8f0ff}
.com-item-t{font-size:9px;font-weight:600;color:#1f2937}
.com-item-d{font-size:8px;color:#7a8c99}
hr.sep{border:none;border-top:1px solid #e5e7eb;margin:2px 0}

.a4{width:800px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;min-height:600px}
.a4-head{background:#2E5090;padding:16px 24px;border-bottom:3px solid #4A90E2;display:flex;justify-content:space-between;align-items:center}
.a4-head-l{display:flex;gap:10px;align-items:center}
.a4-head-logo{background:#4A90E2;padding:4px 9px;border-radius:3px;font-size:10px;font-weight:800;color:#fff}
.a4-head-title{font-size:12px;font-weight:700;color:#fff;border:none;background:transparent;font-family:inherit;padding:0;width:auto;min-width:100px}
.a4-head-title:focus{outline:none;border-bottom:2px solid rgba(255,255,255,0.3)}
.a4-head-dept{font-size:8px;color:rgba(255,255,255,.4);margin-top:1px}
.a4-head-date{font-size:9px;font-weight:600;color:#bfdbfe;text-align:right}
.a4-head-ci{font-size:7px;color:rgba(255,255,255,.35);text-align:right;margin-top:2px}
.a4-body{flex:1;padding:22px 24px;display:flex;flex-direction:column;gap:14px}
.a4-foot{background:#fafbfc;border-top:1px solid #e5e7eb;padding:8px 24px;font-size:7px;color:#7a8c99;text-transform:uppercase;letter-spacing:.5px}

.bloco-wrap{position:relative;border-radius:4px;cursor:pointer;transition:outline .1s}
.bloco-wrap:hover{outline:2px dashed #4A90E2}
.bloco-wrap:hover .bloco-del{opacity:1}
.bloco-del{position:absolute;top:4px;right:4px;opacity:0;background:#fee2e2;color:#dc2626;border:none;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;cursor:pointer;transition:opacity .1s}

.b-cards{display:flex;gap:10px;margin:8px 0;flex-wrap:nowrap;justify-content:stretch}
.b-card{background:#fafbfc;border:1px solid #e5e7eb;border-radius:6px;padding:14px 10px;text-align:center;flex:1;min-width:0;transition:border .1s}
.b-card:hover{border-color:#4A90E2}
.b-card-title{font-size:8px;font-weight:600;color:#7a8c99;text-transform:uppercase;letter-spacing:.5px}
.b-card-value{font-size:24px;font-weight:800;color:#1f2937;line-height:1.2;margin-top:2px}

.b-secao{background:#2E5090;padding:6px 16px;border-radius:3px;margin:4px 0;text-align:center}
.b-secao-titulo{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px}

.b-grafico-wrap{display:inline-block;vertical-align:top;margin:4px;padding:6px;border:1px solid #eef2f6;border-radius:4px;flex:1;min-width:200px}
.b-grafico-wrap .b-grafico-titulo{font-size:10px;font-weight:700;color:#1f2937;text-align:left;margin-bottom:1px}
.b-grafico-wrap .b-grafico-subtitulo{font-size:8px;color:#7a8c99;text-align:left;margin-bottom:4px}
.b-grafico-container{position:relative;margin:0 auto;width:100%}
.b-grafico-container canvas{display:block;width:100%;height:auto;background:#fff;border-radius:3px;border:1px solid #e5e7eb;padding:4px}

.b-graficos-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;width:100%}
.b-graficos-row .bloco-wrap{flex:1;min-width:200px;max-width:100%}

.b-tabela{width:100%;border-collapse:collapse;margin:6px 0}
.b-tabela th{background:#e8ebef;color:#4b5563;padding:6px 8px;font-size:8px;font-weight:700;border:1px solid #d1d5db;text-transform:uppercase;letter-spacing:.4px}
.b-tabela td{padding:6px 8px;font-size:9px;border:1px solid #e5e7eb;color:#4b5563;text-align:center}
.b-tabela tr:nth-child(even) td{background:#fafbfc}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:900}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:6px;width:90%;max-width:600px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal-head{background:#2E5090;color:#fff;padding:12px 16px;border-bottom:2px solid #4A90E2;font-size:12px;font-weight:700;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;line-height:1}
.modal-close:hover{color:#fff}
.modal-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.modal-foot{padding:12px 16px;border-top:1px solid #e5e7eb;display:flex;gap:8px;justify-content:flex-end}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:9px;font-weight:600;color:#1f2937;display:flex;align-items:center;gap:5px}
.fi,.fta,.fsel{border:1px solid #e5e7eb;border-radius:4px;padding:6px 8px;font-size:10px;font-family:inherit;color:#1f2937;background:#fafbfc;width:100%}
.fi:focus,.fta:focus,.fsel:focus{outline:none;border-color:#4A90E2;box-shadow:0 0 0 2px rgba(74,144,226,.12)}
.fta{resize:vertical;min-height:80px}
.fsel{cursor:pointer}
.sl-row{display:flex;align-items:center;gap:8px}
.sl-row input[type=range]{flex:1}
.sl-val{font-size:9px;color:#7a8c99;min-width:38px}
.hint{font-size:8px;color:#7a8c99;margin-top:2px}

.ie-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:none;flex-direction:column}
.ie-overlay.show{display:flex}
.ie-toolbar{background:#0B1D3A;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:2px solid #2A85CA}
.ie-toolbar span{font-size:10px;color:#fff;font-weight:600;margin-right:4px}
.ie-tool-btn{background:#1E3A5F;border:1px solid #2A85CA;color:#fff;padding:5px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.ie-tool-btn:hover,.ie-tool-btn.active{background:#2A85CA}
.ie-color{width:32px;height:32px;border:2px solid #2A85CA;border-radius:4px;cursor:pointer;padding:2px}
.ie-size{width:60px;padding:4px 6px;border:1px solid #2A85CA;border-radius:4px;font-size:10px;background:#1E3A5F;color:#fff;font-family:inherit}
.ie-sep{width:1px;height:24px;background:rgba(255,255,255,.15);margin:0 4px}
.ie-canvas-area{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:20px;background:repeating-conic-gradient(#e0e0e0 0% 25%, #fff 0% 50%) 50%/20px 20px}
.ie-canvas-area canvas{cursor:crosshair;box-shadow:0 2px 12px rgba(0,0,0,.3);max-width:calc(100vw - 60px);max-height:calc(100vh - 160px);object-fit:contain}
.ie-foot{background:#0B1D3A;padding:10px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid #1E3A5F}
.ie-text-input{background:#1E3A5F;border:1px solid #2A85CA;border-radius:4px;padding:4px 8px;color:#fff;font-size:10px;font-family:inherit;width:140px;display:none}
.ie-text-input.show{display:block}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-t">Comunicados Builder</div>
  <div class="hdr-s">Construtor de comunicados internos</div>
  <div class="hdr-r"><button class="hdr-btn" onclick="extrairHTML()">Download HTML</button><button class="hdr-btn" style="margin-left:8px" onclick="baixarJPEG()">Download Imagem</button></div>
</div>
<div class="main">
  <div class="sidebar">
    <div><div class="sec-label">Adicionar bloco</div><div id="tiposBlocos" style="display:flex;flex-direction:column;gap:4px"></div></div>
  </div>
  <div class="content">
    <div class="canvas">
      <div class="a4">
        <div class="a4-head">
          <div class="a4-head-l">
            <div style="font-size:18px;font-weight:700;color:#fff">Dashboard 1</div>
          </div>
        </div>
        <div class="a4-body" id="blocosList"></div>
        <div class="a4-foot">Documento gerado automaticamente • Mundivox Operações</div>
      </div>
    </div>
  </div>
</div>
</div>

<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-head"><span id="modalTitle"></span><button class="modal-close" onclick="fecharModal()">×</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarBloco()">Salvar</button></div>
  </div>
</div>

<div class="ie-overlay" id="imgEditor">
  <div class="ie-toolbar">
    <span>Editor de Imagem</span><div class="ie-sep"></div>
    <button class="ie-tool-btn" id="ie-crop" onclick="setTool('crop')">✂ Cortar</button>
    <button class="ie-tool-btn" id="ie-rect" onclick="setTool('rect')">▭ Retângulo</button>
    <button class="ie-tool-btn" id="ie-arrow" onclick="setTool('arrow')">↗ Seta</button>
    <button class="ie-tool-btn" id="ie-text" onclick="setTool('text')">T Texto</button>
    <input type="text" class="ie-text-input" id="ieTextInput" placeholder="Digite o texto aqui..." onkeydown="if(event.key==='Enter'){event.preventDefault()}">
    <div class="ie-sep"></div>
    <input type="color" class="ie-color" id="ieColor" value="#2A85CA">
    <input type="number" class="ie-size" id="ieSize" value="2" min="1" max="20" title="Espessura">
    <div class="ie-sep"></div>
    <button class="ie-tool-btn" onclick="ieUndo()">↩ Desfazer</button>
  </div>
  <div class="ie-canvas-area"><canvas id="ieCanvas"></canvas></div>
  <div class="ie-foot"><button class="btn btn-secondary" onclick="fecharEditor()">Cancelar</button><button class="btn btn-primary" onclick="confirmarEditor()">Aplicar</button></div>
</div>

<script>
/* ── ESTADO ── */
let comunicados = [{
  id:1, subject:"Autoprovisionamento - Almoxarifado e Técnicos", date:"2025-01-15", department:"Operações",
  blocks:[
    {type:"cards",data:{count:4, items:[{title:"Card 1",value:42},{title:"Card 2",value:73},{title:"Card 3",value:28},{title:"Card 4",value:56}],premissas:""}},
    {type:"secao",data:{titulo:"Nova Seção"}},
    {type:"grafico",data:{titulo:"Vendas por Mês",subtitulo:"",largura:48,tipo:"barra",stacked:false,eixoX:["Jan","Fev","Mar","Abr","Mai","Jun"],series:[{nome:"Vendas",valores:"10,20,15,30,25,40",secundario:false},{nome:"Custos",valores:"5,8,6,12,10,15",secundario:true}],premissas:""}},
    {type:"grafico",data:{titulo:"Margem",subtitulo:"",largura:48,tipo:"linha",stacked:false,eixoX:["Jan","Fev","Mar","Abr","Mai","Jun"],series:[{nome:"Margem %",valores:"15,22,18,30,25,35",secundario:false}],premissas:""}},
    {type:"tabela",data:{cols:["Produto","Qtd","Valor"],rows:[["Item A","10","R$ 150"],["Item B","5","R$ 80"]],premissas:""}}
  ]
}];
let selId=1, editIdx=null, editorCallback=null;


/* ── SVG helpers ── */
function svgI(paths,c,s){return `<svg width="${s||16}" height="${s||16}" fill="none" stroke="${c||'#2A85CA'}" stroke-width="1.8" viewBox="0 0 24 24" style="overflow:visible;flex-shrink:0">${paths}</svg>`}
const ICO={
  cards:    svgI('<rect x="2" y="4" width="8" height="16" rx="1"/><rect x="14" y="4" width="8" height="16" rx="1"/>','#2A85CA',14),
  secao:    svgI('<rect x="2" y="5" width="20" height="14" rx="2" fill="#0B1D3A" stroke="none"/>','#fff',14),
  grafico:  svgI('<polyline points="4 20 20 20"/><polyline points="4 4 4 20"/><rect x="7" y="10" width="4" height="10"/><rect x="13" y="6" width="4" height="14"/>','#2A85CA',14),
  tabela:   svgI('<rect x="3" y="4" width="18" height="16" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="10" y1="4" x2="10" y2="20"/>','#2A85CA',14),
};

const TIPOS=[
  {id:"cards",nome:"Cards",tip:"Grade com número par de cards, cada um com título e valor numérico central."},
  {id:"secao",nome:"Nova Seção",tip:"Faixa de fundo azul escuro com título branco, divide o conteúdo."},
  {id:"grafico",nome:"Gráfico",tip:"Gráfico de barras ou linhas com eixos, séries e opção de 100%."},
  {id:"tabela",nome:"Tabela",tip:"Tabela com colunas e linhas editáveis, sem formatação avançada."},
];
const TIPS=Object.fromEntries(TIPOS.map(t=>[t.id,t.tip]));

const TPL={
  cards:{count:4, items:[{title:"Card 1",value:0},{title:"Card 2",value:0},{title:"Card 3",value:0},{title:"Card 4",value:0}]},
  secao:{titulo:"Nova Seção"},
  grafico:{titulo:"Gráfico",subtitulo:"",largura:48,altura:300,tipo:"barra",colorido:true,stacked:false,eixoX:["Jan","Fev","Mar","Abr"],series:[{nome:"Série 1",valores:"10,20,15,30",secundario:false},{nome:"Série 2",valores:"5,8,6,12",secundario:true}]},
  tabela:{titulo:"Nova Tabela",cols:["Coluna 1","Coluna 2"],rows:[["Dado 1","Dado 2"],["Dado 3","Dado 4"]]},
};

/* ── RENDER ── */
function render(){
  document.getElementById('tiposBlocos').innerHTML=TIPOS.map(t=>`<button class="bloco-btn" onclick="addBloco('${t.id}')">${ICO[t.id]} ${t.nome}</button>`).join('');
  renderPreview();
}

function renderPreview(){
  const com=comunicados.find(c=>c.id===selId);
  if(!com) return;
  
  let html = '';
  let grafBuffer = [];
  const blocks = com.blocks;
  
  for(let i=0; i<blocks.length; i++){
    const b = blocks[i];
    if(b.type === 'grafico'){
      grafBuffer.push({b, idx:i});
      if(grafBuffer.length === 2 || i === blocks.length-1){
        html += `<div class="b-graficos-row">`;
        grafBuffer.forEach(({b, idx}) => {
          html += `<div class="bloco-wrap" data-idx="${idx}" onclick="editBloco(${idx})" style="flex:1;min-width:200px;max-width:${100/grafBuffer.length}%">${renderBloco(b)}<button class="bloco-del" onclick="delBloco(${idx});event.stopPropagation()">✕</button></div>`;
        });
        html += `</div>`;
        grafBuffer = [];
      }
    } else {
      if(grafBuffer.length > 0){
        html += `<div class="b-graficos-row">`;
        grafBuffer.forEach(({b, idx}) => {
          html += `<div class="bloco-wrap" data-idx="${idx}" onclick="editBloco(${idx})" style="flex:1;min-width:200px;max-width:${100/grafBuffer.length}%">${renderBloco(b)}<button class="bloco-del" onclick="delBloco(${idx});event.stopPropagation()">✕</button></div>`;
        });
        html += `</div>`;
        grafBuffer = [];
      }
      html += `<div class="bloco-wrap" data-idx="${i}" onclick="editBloco(${i})">${renderBloco(b)}<button class="bloco-del" onclick="delBloco(${i});event.stopPropagation()">✕</button></div>`;
    }
  }
  if(grafBuffer.length > 0){
    html += `<div class="b-graficos-row">`;
    grafBuffer.forEach(({b, idx}) => {
      html += `<div class="bloco-wrap" data-idx="${idx}" onclick="editBloco(${idx})" style="flex:1;min-width:200px;max-width:${100/grafBuffer.length}%">${renderBloco(b)}<button class="bloco-del" onclick="delBloco(${idx});event.stopPropagation()">✕</button></div>`;
    });
    html += `</div>`;
  }
  
  document.getElementById('blocosList').innerHTML = html || '<div style="color:#8896a7;font-size:10px;text-align:center;padding:50px 0">Use a barra lateral para adicionar blocos</div>';
  
  // Renderiza os gráficos após o DOM ser atualizado
  setTimeout(function() {
    renderizarTodosGraficos();
  }, 200);
}

function renderizarTodosGraficos(){
  const canvases = document.querySelectorAll('.b-grafico-container canvas');
  if (canvases.length === 0) return;
  
  const com = comunicados.find(c => c.id === selId);
  if (!com) return;
  
  canvases.forEach(function(canvas) {
    try {
      const blocoEl = canvas.closest('.bloco-wrap');
      if (!blocoEl) return;
      
      const idx = parseInt(blocoEl.dataset.idx);
      if (isNaN(idx)) return;
      
      const b = com.blocks[idx];
      if (!b || b.type !== 'grafico') return;
      
      desenharGrafico(canvas, b.data);
    } catch(e) {
      console.warn('Erro ao renderizar gráfico:', e);
    }
  });
}

function renderBloco(b){
  const d=b.data;
  switch(b.type){
    case 'cards':{
      const count = d.count || 4;
      const items = d.items.slice(0, count);
      const premissasHtml = d.premissas ? `<div style="margin-top:12px;padding:8px;background:#f9fafb;border-left:3px solid #2a85ca;font-size:8px;color:#6b7280"><strong>Premissas:</strong> ${d.premissas}</div>` : '';
      return `<div class="b-cards" style="display:flex;flex-wrap:nowrap;gap:10px;justify-content:stretch">${items.map(card=>`
        <div class="b-card" style="flex:1;min-width:0"><div class="b-card-title">${card.title}</div><div class="b-card-value">${card.value}</div></div>
      `).join('')}</div>${premissasHtml}`;
    }
    case 'secao':return `<div class="b-secao"><div class="b-secao-titulo">${d.titulo}</div></div>`;
    case 'grafico':{
      const id = 'graf-' + Math.random().toString(36).slice(2,8);
      const altura = d.altura || 300;
      const premissasHtml = d.premissas ? `<div style="margin-top:12px;padding:8px;background:#f9fafb;border-left:3px solid #2a85ca;font-size:8px;color:#6b7280"><strong>Premissas:</strong> ${d.premissas}</div>` : '';
      return `<div class="b-grafico-wrap" style="width:100%;min-width:200px">
        ${d.titulo?`<div class="b-grafico-titulo">${d.titulo}</div>`:''}
        ${d.subtitulo?`<div class="b-grafico-subtitulo">${d.subtitulo}</div>`:''}
        <div class="b-grafico-container"><canvas id="${id}" style="width:100%;height:${altura}px;display:block"></canvas></div>
        ${premissasHtml}
      </div>`;
    }
    case 'tabela':{
      const premissasHtml = d.premissas ? `<div style="margin-top:12px;padding:8px;background:#f9fafb;border-left:3px solid #2a85ca;font-size:8px;color:#6b7280"><strong>Premissas:</strong> ${d.premissas}</div>` : '';
      return `<div><div style="font-size:10px;font-weight:700;color:#1f2937;text-align:left;margin-bottom:8px">${d.titulo || 'Tabela'}</div><table class="b-tabela"><thead><tr>${d.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${d.rows.map(row=>`<tr>${row.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table>${premissasHtml}</div>`;
    }
    default:return '';
  }
}

/* ── DESENHAR GRÁFICO ── */
function desenharGrafico(canvas, d){
  if (!d || !d.series || d.series.length === 0 || !d.eixoX || d.eixoX.length === 0) {
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    const w = rect.width || 300; const h = rect.height || 200;
    canvas.width = w*2; canvas.height = h*2;
    canvas.style.width = w+'px'; canvas.style.height = h+'px';
    ctx.scale(2,2); ctx.fillStyle='#f5f5f5'; ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#999'; ctx.font='14px Inter,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Sem dados para exibir', w/2, h/2);
    return;
  }

  const rect = canvas.parentElement.getBoundingClientRect();
  let w = rect.width || 300;
  let h = rect.height || 300;
  if (h <= 0) h = 300;

  const series = d.series || [];
  const labels = d.eixoX || [];

  // Paleta: Azul escuro, azul claro, verde água, cinza, laranja
  const PALETA = ['#2E5090','#4A90E2','#20C997','#7A8C99','#FF8C42'];
  const cores = PALETA;

  const LEGENDA_H = series.length > 0 ? 20 : 0;
  const pad = {top: 12 + LEGENDA_H, bottom: 22, left:44, right:16};

  canvas.width = w*2; canvas.height = h*2;
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2,2);

  const chartW = w - pad.left - pad.right;
  const chartH = h - pad.top - pad.bottom;

  const stacked = d.stacked;
  const colorido = d.colorido;

  const dados = series.map(s => s.valores.split(',').map(v => parseFloat(v.trim()) || 0));

  // Para modo colorido com barra única, cada barra tem cor diferente
  // Para modo normal, cada série tem cor diferente
  let maxVal = 0;
  dados.forEach(ds => ds.forEach(v => { if(v > maxVal) maxVal = v; }));
  if(maxVal === 0) maxVal = 10;

  let dadosPlot = dados;
  if(stacked) {
    const totals = labels.map((_,i) => { let s=0; dados.forEach(ds=>{s+=ds[i]||0;}); return s||1; });
    dadosPlot = dados.map(ds => ds.map((v,i) => (v/totals[i])*100));
    maxVal = 100;
  }
  const maxY = maxVal * 1.15;

  // Fundo
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w, h);

  // Grid lines horizontais
  const stepsY = 4;
  for(let i = 0; i <= stepsY; i++){
    const y = pad.top + chartH - (i/stepsY)*chartH;
    ctx.strokeStyle = '#eef0f3';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+chartW, y); ctx.stroke();
  }

  // Eixo Y labels
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#9ba8b5'; ctx.font = '7px Inter,sans-serif';
  for(let i = 0; i <= stepsY; i++){
    const y = pad.top + chartH - (i/stepsY)*chartH;
    ctx.fillText(Math.round((i/stepsY)*maxY), pad.left - 5, y);
  }

  // Eixo X (começa na borda esquerda para linhas, centrado para barras)
  const nSeries = series.length;
  const temBarra = series.some(s => !s.isLinha);
  const temLinha = series.some(s => s.isLinha);

  // Para barras: stepX por grupo centrado; para linhas: distribuído de borda a borda
  const stepXBarra = chartW / labels.length;
  const stepXLinha = labels.length > 1 ? chartW / (labels.length - 1) : chartW;

  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#9ba8b5'; ctx.font = '8px Inter,sans-serif';
  labels.forEach((lab, i) => {
    // Posicionar label alinhado com onde a linha passa
    const x = temBarra ? pad.left + i*stepXBarra + stepXBarra/2 : pad.left + i*stepXLinha;
    ctx.fillText(lab, x, pad.top + chartH + 4);
  });

  // Eixo X linha base
  ctx.strokeStyle = '#dde3ec'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top+chartH); ctx.lineTo(pad.left+chartW, pad.top+chartH); ctx.stroke();

  // Barras agrupadas por série
  const seriesBarra = series.filter(s => !s.isLinha);
  const seriesLinha = series.filter(s => s.isLinha);

  if(seriesBarra.length > 0){
    const nBarra = seriesBarra.length;
    const groupW = stepXBarra;
    let barW;
    if(labels.length <= 2) barW = Math.min(groupW*0.8/nBarra, 70);
    else if(labels.length <= 4) barW = Math.min(groupW*0.75/nBarra, 55);
    else if(labels.length <= 6) barW = Math.min(groupW*0.7/nBarra, 45);
    else barW = Math.min(groupW*0.6/nBarra, 35);

    const gap = nBarra > 1 ? 2 : 0;
    const totalBarW = nBarra*barW + (nBarra-1)*gap;

    seriesBarra.forEach((serie, sbi) => {
      const si = series.indexOf(serie);
      const cor = colorido && nSeries === 1 ? null : cores[si % cores.length];

      for(let i = 0; i < labels.length; i++){
        const vals = dadosPlot[si] || [];
        const val = vals[i] || 0;
        const hBar = (val/maxY)*chartH;
        const groupX = pad.left + i*groupW + (groupW - totalBarW)/2;
        const x = groupX + sbi*(barW+gap);
        const barCor = colorido && nSeries === 1 ? cores[i % cores.length] : cor;
        ctx.fillStyle = barCor;
        ctx.fillRect(x, pad.top+chartH-hBar, barW, hBar);
      }
    });
  }

  // Linhas
  seriesLinha.forEach((serie, sli) => {
    const si = series.indexOf(serie);
    const cor = cores[si % cores.length];
    const rgb = parseInt(cor.slice(1), 16);
    const r = (rgb>>16)&255, g = (rgb>>8)&255, b = rgb&255;
    const vals = dadosPlot[si] || [];

    // Área preenchida (só se não tiver semFill)
    if(!serie.semFill){
      ctx.fillStyle = `rgba(${r},${g},${b},0.07)`;
      ctx.beginPath();
      vals.forEach((val, i) => {
        const x = pad.left + i*stepXLinha;
        const y = pad.top + chartH - (val/maxY)*chartH;
        if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.lineTo(pad.left + (vals.length-1)*stepXLinha, pad.top+chartH);
      ctx.lineTo(pad.left, pad.top+chartH);
      ctx.closePath(); ctx.fill();
    }

    // Linha
    ctx.strokeStyle = cor; ctx.lineWidth = 2;
    ctx.beginPath();
    vals.forEach((val, i) => {
      const x = pad.left + i*stepXLinha;
      const y = pad.top + chartH - (val/maxY)*chartH;
      if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Pontos
    vals.forEach((val, i) => {
      const x = pad.left + i*stepXLinha;
      const y = pad.top + chartH - (val/maxY)*chartH;
      ctx.fillStyle = cor;
      ctx.beginPath(); ctx.arc(x, y, 3, 0, 2*Math.PI); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    });
  });

  // Legenda no TOPO, centralizada
  if(series.length > 0){
    // Calcular largura total da legenda
    ctx.font = '8px Inter,sans-serif';
    const itemW = 16 + 70; // ícone + texto aprox
    const totalLegW = series.reduce((acc, s) => acc + 16 + ctx.measureText(s.nome).width + 16, 0);
    let legX = Math.max(pad.left, (w - totalLegW) / 2);
    const legY = 6;
    ctx.textBaseline = 'middle';
    series.forEach((s, si) => {
      const cor = cores[si % cores.length];
      if(s.isLinha){
        ctx.strokeStyle = cor; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(legX, legY+4); ctx.lineTo(legX+14, legY+4); ctx.stroke();
        ctx.fillStyle = cor;
        ctx.beginPath(); ctx.arc(legX+7, legY+4, 2.5, 0, 2*Math.PI); ctx.fill();
      } else {
        ctx.fillStyle = cor;
        ctx.fillRect(legX, legY, 10, 8);
      }
      ctx.fillStyle = '#4b5563'; ctx.textAlign = 'left';
      ctx.fillText(s.nome, legX+16, legY+4);
      legX += 16 + ctx.measureText(s.nome).width + 14;
    });
  }
}

/* ── CRUD ── */
function addBloco(t){
  const com=comunicados.find(c=>c.id===selId);
  if(!com) return;
  const novo = {type:t,data:JSON.parse(JSON.stringify(TPL[t]))};
  if(t==='cards'){
    novo.data.count = 4;
    novo.data.items = [
      {title:"Card 1",value:0},{title:"Card 2",value:0},
      {title:"Card 3",value:0},{title:"Card 4",value:0}
    ];
  }
  com.blocks.push(novo);
  const newIdx = com.blocks.length - 1;
  editBloco(newIdx);
}

function delBloco(i){
  const com=comunicados.find(c=>c.id===selId);
  if(com) com.blocks.splice(i,1);
  renderPreview();
}

/* ── MODAL ── */
function editBloco(i){
  editIdx=i;
  const com = comunicados.find(c=>c.id===selId);
  if(!com || i>=com.blocks.length) return;
  const b = com.blocks[i];
  const tipo=TIPOS.find(t=>t.id===b.type);
  document.getElementById('modalTitle').textContent=`Editar: ${tipo?tipo.nome:b.type}`;
  document.getElementById('modalBody').innerHTML=buildForm(b);
  document.getElementById('modal').classList.add('show');
  
  // Listeners para sliders
  const fLargura = document.getElementById('f-largura');
  const fAltura = document.getElementById('f-altura');
  if(fLargura) fLargura.addEventListener('input', e => {
    document.getElementById('lbl-larg').textContent = e.target.value + '%';
  });
  if(fAltura) fAltura.addEventListener('input', e => {
    document.getElementById('lbl-alt').textContent = e.target.value + 'px';
  });
  
  // Auto-plot ao mudar eixo X
  setTimeout(function() {
    const fEixoX = document.getElementById('f-eixox');
    const serieInputs = document.querySelectorAll('input[data-serie][data-field="valores"]');
    
    if(fEixoX && serieInputs.length > 0) {
      fEixoX.addEventListener('change', function() {
        const numCols = this.value.split(',').length;
        serieInputs.forEach((inp, idx) => {
          // Sempre ajustar número de itens conforme eixo X
          const valoresAtuais = inp.value.split(',').map(v => v.trim());
          let novosDados = [];
          
          if(valoresAtuais.length >= numCols) {
            // Se tem mais valores que colunas, truncar
            novosDados = valoresAtuais.slice(0, numCols);
          } else {
            // Se tem menos, preencher com valores aleatórios
            novosDados = valoresAtuais.slice();
            for(let j = valoresAtuais.length; j < numCols; j++) {
              novosDados.push(Math.floor(Math.random() * 40) + 10);
            }
          }
          inp.value = novosDados.join(',');
        });
      });
      
      // Auto-fill de dados: quando preencher primeira série, copiar para as demais
      if(serieInputs[0]) {
        serieInputs[0].addEventListener('change', function() {
          const valores = this.value.trim();
          if(valores && !valores.includes(',')) {
            // Se for apenas um número, autofill com incrementos
            const baseNum = parseInt(valores);
            if(!isNaN(baseNum)) {
              const numCols = document.querySelector('#f-eixox')?.value.split(',').length || 6;
              let novosDados = [];
              for(let j = 0; j < numCols; j++) {
                novosDados.push(baseNum + j * 5);
              }
              serieInputs.forEach((inp, idx) => {
                if(idx > 0) {
                  inp.value = novosDados.map((v, j) => Math.max(0, v - idx * 3)).join(',');
                }
              });
            }
          }
        });
      }
    }
    
    // Sugestão automática de tipos para tabelas
    const tabelaCols = document.querySelector('#modalBody input[data-col="0"]');
    if(tabelaCols) {
      tabelaCols.addEventListener('blur', function() {
        // Sugerir tipos baseado no nome
        const colName = this.value.toLowerCase();
        let tipoSugerido = 'texto';
        if(colName.includes('valor') || colName.includes('preço') || colName.includes('quantidade') || colName.includes('qtd')) tipoSugerido = 'número inteiro';
        else if(colName.includes('%') || colName.includes('taxa') || colName.includes('percentual')) tipoSugerido = '%';
        else if(colName.includes('data') || colName.includes('date')) tipoSugerido = 'data';
        
        if(tipoSugerido !== 'texto') {
          alert(`Coluna "${this.value}" - Tipo sugerido: ${tipoSugerido}`);
        }
      });
    }
    
    // Auto-preencher tabela com dados de exemplo
    const tableRows = document.querySelectorAll('#modalBody input[data-row][data-col="0"]');
    tableRows.forEach((inp, idx) => {
      if(!inp.value) {
        inp.value = `Dado ${idx + 1}`;
      }
    });
    
    // Adicionar listeners para tabela (auto-save ao editar)
    if(document.querySelector('#modalBody input[data-col="0"]')) {
      addTabelaListeners();
    }
  }, 100);
}

function fecharModal(){
  document.getElementById('modal').classList.remove('show');
  editIdx=null;
}

function tipBtn(tipId){
  const id='tip-'+Math.random().toString(36).slice(2,8);
  return `<button class="tip-btn" onclick="var p=document.getElementById('${id}');p.classList.toggle('show')" title="Ajuda"></button><div class="tip-panel" id="${id}">${TIPS[tipId]||''}</div>`;
}
function lbl(t,tipId){return `<div class="fl">${t} ${tipId?tipBtn(tipId):''}</div>`}

function buildForm(b){
  const d=b.data, e=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  switch(b.type){
    case 'cards':return buildFormCards(d,e);
    case 'secao':return `<div class="fg">${lbl('Título da Seção')}<input class="fi" id="f-titulo" value="${e(d.titulo)}"></div>`;
    case 'grafico':return buildFormGrafico(d,e);
    case 'tabela':return buildFormTabela(d,e);
    default:return '';
  }
}

function buildFormCards(d,e){
  let html = `<div class="fg">${lbl('Número de cards')}
    <select class="fsel" id="f-count">
      ${[2,4,6,8].map(n=>`<option value="${n}" ${d.count===n?'selected':''}>${n}</option>`).join('')}
    </select>
  </div>
  <div id="cards-container">`;
  d.items.forEach((item,i)=>{
    html += `<div style="display:flex;gap:8px;margin-bottom:4px;align-items:center">
      <input class="fi" style="flex:1" placeholder="Título" value="${e(item.title)}" data-card="${i}" data-field="title">
      <input class="fi" style="width:80px" type="number" value="${item.value}" data-card="${i}" data-field="value">
    </div>`;
  });
  html += `</div>
    <div class="fg">${lbl('Premissas')}<textarea class="fi" id="f-premissas" style="min-height:60px;resize:vertical" placeholder="Ex: Métricas de performance do período">${e(d.premissas || '')}</textarea></div>`;
  return html;
}

function buildFormGrafico(d,e){
  const labels = d.eixoX.join(', ');
  
  const rangeMatch = labels.match(/^(\d+)\s*-\s*(\d+)$/);
  const rangeHtml = `<div class="fg">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <label style="font-size:9px;font-weight:600;color:#1f2937;white-space:nowrap">Range (ex: 1-12)</label>
      <input class="fi" style="width:80px" placeholder="1-12" id="f-range" value="${rangeMatch ? labels : ''}">
      <select class="fsel" style="width:90px" id="f-range-tipo">
        <option value="meses" ${labels.includes('Jan')?'selected':''}>Meses</option>
        <option value="dias" ${labels.includes('Dia')?'selected':''}>Dias</option>
        <option value="anos" ${labels.includes('202')?'selected':''}>Anos</option>
        <option value="numeros">Números</option>
      </select>
      <button class="btn btn-sm btn-primary" onclick="aplicarRange()">Aplicar</button>
    </div>
    <div class="hint">Range como "1-12" para gerar automaticamente</div>
  </div>`;

  let seriesHtml = d.series.map((s,i)=>`
    <div style="background:#fafbfc;border:1px solid #e5e7eb;border-radius:4px;padding:8px;margin-bottom:6px;display:flex;flex-direction:column;gap:6px">
      <div style="display:flex;gap:6px;align-items:center">
        <input class="fi" style="flex:1" placeholder="Nome da série" value="${e(s.nome)}" data-serie="${i}" data-field="nome">
        <select class="fsel" style="width:80px" data-serie="${i}" data-field="tipoSerie">
          <option value="barra" ${!s.isLinha?'selected':''}>Barra</option>
          <option value="linha" ${s.isLinha?'selected':''}>Linha</option>
        </select>
        <button class="btn-danger" onclick="removerSerie(${i})">✕</button>
      </div>
      <input class="fi" placeholder="Valores (separados por vírgula)" value="${e(s.valores)}" data-serie="${i}" data-field="valores">
      ${s.isLinha ? `<label style="display:flex;align-items:center;gap:6px;font-size:9px;color:#4b5563;cursor:pointer"><input type="checkbox" data-serie="${i}" data-field="semFill" ${s.semFill?'checked':''}> Sem área preenchida</label>` : ''}
    </div>
  `).join('');

  return `
    <div class="fg"><div class="fl">Título</div><input class="fi" id="f-titulo" value="${e(d.titulo)}"></div>
    <div class="fg"><div class="fl">Subtítulo</div><input class="fi" id="f-subtitulo" value="${e(d.subtitulo)}"></div>
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:1"><div class="fl">Largura (%)</div><div class="sl-row"><input type="range" min="25" max="100" id="f-largura" value="${d.largura}" style="flex:1"><span class="sl-val" id="lbl-larg">${d.largura}%</span></div></div>
      <div class="fg" style="flex:1"><div class="fl">Altura (px)</div><div class="sl-row"><input type="range" min="150" max="500" id="f-altura" value="${d.altura || 300}" style="flex:1"><span class="sl-val" id="lbl-alt">${d.altura || 300}px</span></div></div>
    </div>
    <div style="display:flex;gap:16px;align-items:center;padding:8px 0;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb">
      <label style="display:flex;align-items:center;gap:6px;font-size:9px;font-weight:600;color:#1f2937;cursor:pointer"><input type="checkbox" id="f-colorido" ${d.colorido?'checked':''}> Colorido por coluna</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:9px;font-weight:600;color:#1f2937;cursor:pointer"><input type="checkbox" id="f-stacked" ${d.stacked?'checked':''}> 100% empilhado</label>
    </div>
    <div class="fg"><div class="fl">Eixo X (categorias ou range)</div>
      <input class="fi" id="f-eixox" value="${e(labels)}" placeholder="Ex: Jan, Fev, Mar ou use range abaixo">
    </div>
    ${rangeHtml}
    <div class="fg"><div class="fl">Séries</div>
      <button class="btn btn-sm btn-secondary" style="margin-bottom:8px;width:100%" onclick="atualizarSeriesPorEixo()">↻ Adaptar séries ao eixo X</button>
      <div id="series-container">${seriesHtml}</div>
      <button class="btn btn-sm btn-secondary" onclick="adicionarSerie()">+ Adicionar série</button>
    </div>
    <div class="fg"><div class="fl">Premissas</div><textarea class="fi" id="f-premissas" style="min-height:60px;resize:vertical" placeholder="Ex: Dados calculados com base em vendas de Q1-Q2">${e(d.premissas || '')}</textarea></div>`;
}

function buildFormTabela(d,e){
  if(!d.cols) d.cols = [];
  if(!d.tipos) d.tipos = [];
  if(!d.rows) d.rows = [];
  
  // Sincronizar tipos com colunas
  while(d.tipos.length < d.cols.length) {
    const c = d.cols[d.tipos.length];
    const n = c ? c.toLowerCase() : '';
    let tipo = '%';
    if(n.includes('%') || n.includes('taxa') || n.includes('percentual')) tipo = '%';
    else if(n.includes('r$') || n.includes('receita') || n.includes('custo') || n.includes('preco') || n.includes('preço')) tipo = 'R$';
    else if(n.includes('qtd') || n.includes('quantidade') || n.includes('numero') || n.includes('número')) tipo = 'número inteiro';
    else if(n.includes('data') || n.includes('date')) tipo = 'data';
    d.tipos.push(tipo);
  }

  const mkOpts = (i) => {
    const tipoAtual = d.tipos[i] || '%';
    return ['%','R$','número inteiro','texto','data'].map(t=>
      `<option value="${t}" ${tipoAtual === t ? 'selected':''}>${t}</option>`
    ).join('');
  };

  let colsHtml = d.cols.map((c,i)=>`
    <div style="display:flex;gap:4px;align-items:center">
      <input class="fi" style="flex:1" value="${e(c)}" data-col="${i}">
      <select class="fsel" style="width:110px" data-col-tipo="${i}">${mkOpts(i)}</select>
      <button class="btn-danger" onclick="removerColuna(${i})">✕</button>
    </div>
  `).join('');

  let rowsHtml = d.rows.map((row,ri)=>`
    <div style="display:flex;gap:4px;align-items:center">
      ${row.map((cell,ci)=>`<input class="fi" style="flex:1" value="${e(cell)}" data-row="${ri}" data-col="${ci}">`).join('')}
      <button class="btn-danger" onclick="removerLinha(${ri})">✕</button>
    </div>
  `).join('');

  return `<div class="fg">${lbl('Título')}<input class="fi" id="f-titulo" value="${e(d.titulo || '')}"></div>
    <div class="fg">${lbl('Colunas (nome + tipo)')}<div style="display:flex;flex-direction:column;gap:4px">${colsHtml}<button class="btn btn-sm btn-secondary" onclick="adicionarColuna()">+ Adicionar coluna</button></div></div>
    <div class="fg">${lbl('Linhas')}<div style="display:flex;flex-direction:column;gap:4px">
      <button class="btn btn-sm btn-secondary" style="width:100%;margin-bottom:4px" onclick="atualizarDadosTabela()">↻ Gerar dados nas linhas conforme tipos</button>
      ${rowsHtml}</div>
      <button class="btn btn-sm btn-secondary" onclick="adicionarLinha()">+ Adicionar linha</button>
    </div>
    <div class="fg">${lbl('Premissas')}<textarea class="fi" id="f-premissas" style="min-height:60px;resize:vertical" placeholder="Ex: Dados de janeiro, fonte: sistema de vendas">${e(d.premissas || '')}</textarea></div>`;
}


function adicionarSerie(){
  const d = getCur();
  if(!d) return;
  salvarBlocoInterno();
  const numCols = d.eixoX.length || 6;
  let valores = [];
  for(let i = 0; i < numCols; i++) valores.push(Math.floor(Math.random() * 40) + 10);
  d.series.push({nome:'Nova série', valores:valores.join(','), isLinha:false});
  rebuildForm('grafico');
}

function atualizarDadosTabela(){
  const d = getCur();
  if(!d || !d.rows) return;

  salvarBlocoInterno();
  
  // Garantir sincronização
  if(!d.tipos) d.tipos = [];
  while(d.tipos.length < d.cols.length) d.tipos.push('%');
  
  const tipos = d.tipos;

  d.rows.forEach((row, ri) => {
    row.forEach((cell, ci) => {
      const tipo = tipos[ci] || '%';
      let v = '';
      if(tipo === '%') v = Math.floor(Math.random()*100) + '%';
      else if(tipo === 'R$') v = 'R$ ' + (Math.floor(Math.random()*9000)+1000).toLocaleString('pt-BR');
      else if(tipo === 'número inteiro') v = String(Math.floor(Math.random()*1000));
      else if(tipo === 'data') {
        const dia = String(Math.floor(Math.random()*28)+1).padStart(2,'0');
        const mes = String(Math.floor(Math.random()*12)+1).padStart(2,'0');
        v = `${dia}/${mes}/2024`;
      } else v = `Item ${ri+1}`;
      d.rows[ri][ci] = v;
    });
  });
  rebuildForm('tabela');
}

function syncTabelaDoDOM(){
  const d = getCur();
  if(!d) return;
  
  if(!d.cols) d.cols = [];
  if(!d.tipos) d.tipos = [];
  if(!d.rows) d.rows = [];
  
  // IMPORTANTE: usar :not([data-row]) para pegar SÓ inputs de nome de coluna
  const colInputs = document.querySelectorAll('#modalBody input[data-col]:not([data-row])');
  colInputs.forEach(inp => {
    const idx = parseInt(inp.dataset.col);
    if(!isNaN(idx) && idx >= 0) d.cols[idx] = inp.value;
  });
  
  const typeSelects = document.querySelectorAll('#modalBody select[data-col-tipo]');
  typeSelects.forEach(sel => {
    const idx = parseInt(sel.dataset.colTipo);
    if(!isNaN(idx) && idx >= 0) d.tipos[idx] = sel.value;
  });
  
  // Sync dados das linhas também
  document.querySelectorAll('#modalBody input[data-row][data-col]').forEach(inp => {
    const ri = parseInt(inp.dataset.row);
    const ci = parseInt(inp.dataset.col);
    if(!isNaN(ri) && !isNaN(ci) && d.rows[ri]) d.rows[ri][ci] = inp.value;
  });
  
  while(d.tipos.length < d.cols.length) d.tipos.push('%');
  d.tipos = d.tipos.slice(0, d.cols.length);
}

function adicionarColuna(){
  const d = getCur();
  if(!d) return;
  syncTabelaDoDOM();
  d.cols.push('Nova');
  d.tipos.push('%');
  d.rows.forEach(r => r.push(''));
  rebuildForm('tabela');
  addTabelaListeners();
}

function removerColuna(i){
  const d = getCur();
  if(!d) return;
  syncTabelaDoDOM();
  d.cols.splice(i, 1);
  d.tipos.splice(i, 1);
  d.rows.forEach(r => r.splice(i, 1));
  rebuildForm('tabela');
  addTabelaListeners();
}

function adicionarLinha(){
  const d = getCur();
  if(!d) return;
  syncTabelaDoDOM();
  d.rows.push(Array(d.cols.length).fill(''));
  rebuildForm('tabela');
  addTabelaListeners();
}

function removerLinha(i){
  const d = getCur();
  if(!d) return;
  syncTabelaDoDOM();
  d.rows.splice(i, 1);
  rebuildForm('tabela');
  addTabelaListeners();
}

function atualizarDadosTabela(){

  syncTabelaDoDOM();
  const tipos = d.tipos || [];

  d.rows.forEach((row, ri) => {

      else if(tipo === 'R$') v = 'R$ ' + (Math.floor(Math.random()*9000)+1000).toLocaleString('pt-BR');
      else if(tipo === 'número inteiro') v = String(Math.floor(Math.random()*1000));
      else if(tipo === 'data') {
        const dia = String(Math.floor(Math.random()*28)+1).padStart(2,'0');
        const mes = String(Math.floor(Math.random()*12)+1).padStart(2,'0');
        v = `${dia}/${mes}/2024`;
      } else v = `Item ${ri+1}`;

function addTabelaListeners(){
  const d = getCur();
  if(!d) return;
  
  // Auto-save nome de coluna ao editar (SÓ inputs sem data-row)
  document.querySelectorAll('#modalBody input[data-col]:not([data-row])').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const idx = parseInt(e.target.dataset.col);
      if(!isNaN(idx) && idx >= 0) d.cols[idx] = e.target.value;
    });
  });
  
  // Auto-save tipo de coluna ao mudar
  document.querySelectorAll('#modalBody select[data-col-tipo]').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const idx = parseInt(e.target.dataset.colTipo);
      if(!isNaN(idx) && idx >= 0) d.tipos[idx] = e.target.value;
    });
  });
  
  // Auto-save dados das linhas ao editar (inputs COM data-row)
  document.querySelectorAll('#modalBody input[data-row][data-col]').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const ri = parseInt(e.target.dataset.row);
      const ci = parseInt(e.target.dataset.col);
      if(!isNaN(ri) && !isNaN(ci) && d.rows[ri]) d.rows[ri][ci] = e.target.value;
    });
  });
}

function atualizarSeriesPorEixo(){
  const d = getCur();
  if(!d || !d.series) return;
  salvarBlocoInterno();
  const numCols = d.eixoX.length || 6;
  
  d.series.forEach(serie => {
    const valoresAtuais = serie.valores.split(',').map(v => v.trim());
    let novosDados = [];
    
    if(valoresAtuais.length >= numCols) {
      novosDados = valoresAtuais.slice(0, numCols);
    } else {
      novosDados = valoresAtuais.slice();
      for(let j = valoresAtuais.length; j < numCols; j++) {
        novosDados.push(Math.floor(Math.random() * 40) + 10);
      }
    }
    serie.valores = novosDados.join(',');
  });
  
  rebuildForm('grafico');
}

function removerSerie(i){
  const d = getCur();
  if(!d) return;
  salvarBlocoInterno();
  d.series.splice(i,1);
  rebuildForm('grafico');
}





function aplicarRange(){
  const rangeInput = document.getElementById('f-range');
  const tipoSelect = document.getElementById('f-range-tipo');
  if(!rangeInput || !rangeInput.value) return;
  const match = rangeInput.value.match(/^(\d+)\s*-\s*(\d+)$/);
  if(!match) return;
  const start = parseInt(match[1]);
  const end = parseInt(match[2]);
  const tipo = tipoSelect ? tipoSelect.value : 'numeros';
  const labels = [];
  const nomes = {
    meses: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
    dias: ['Dia 1','Dia 2','Dia 3','Dia 4','Dia 5','Dia 6','Dia 7','Dia 8','Dia 9','Dia 10','Dia 11','Dia 12'],
    anos: ['2020','2021','2022','2023','2024','2025','2026','2027','2028','2029','2030','2031']
  };
  for(let i=start; i<=end; i++){
    if(tipo === 'meses' && i-1 < nomes.meses.length) labels.push(nomes.meses[i-1]);
    else if(tipo === 'dias' && i-1 < nomes.dias.length) labels.push(nomes.dias[i-1]);
    else if(tipo === 'anos' && i-1 < nomes.anos.length) labels.push(nomes.anos[i-1]);
    else labels.push(String(i));
  }
  const d = getCur();
  if(!d) return;
  d.eixoX = labels;
  document.getElementById('f-eixox').value = labels.join(', ');
}

function rebuildForm(tipo){
  const com = comunicados.find(c=>c.id===selId);
  if(editIdx === null || editIdx >= com.blocks.length) return;
  const b = com.blocks[editIdx];
  if(b.type !== tipo) return;
  document.getElementById('modalBody').innerHTML = buildForm(b);
}

function getCur(){
  const com = comunicados.find(c=>c.id===selId);
  if(editIdx !== null && editIdx < com.blocks.length){
    return com.blocks[editIdx].data;
  }
  return null;
}

/* ── SALVAR BLOCO ── */
function salvarBlocoInterno(){
  if(editIdx === null) return;
  const com = comunicados.find(c=>c.id===selId);
  if(!com || editIdx >= com.blocks.length) return;
  
  const b = com.blocks[editIdx];
  const d = b.data;
  
  if(b.type === 'secao'){
    const fTitulo = document.getElementById('f-titulo');
    if(fTitulo) d.titulo = fTitulo.value;
  }
  else if(b.type === 'cards'){
    const fCount = document.getElementById('f-count');
    if(fCount) {
      const newCount = parseInt(fCount.value);
      d.count = newCount;
      while(d.items.length < newCount) d.items.push({title:'Card '+(d.items.length+1), value:0});
      while(d.items.length > newCount) d.items.pop();
    }
    const fPremissas = document.getElementById('f-premissas');
    if(fPremissas) d.premissas = fPremissas.value;
    document.querySelectorAll('#cards-container input').forEach(inp=>{
      const i = parseInt(inp.dataset.card);
      const field = inp.dataset.field;
      if(!isNaN(i) && field && d.items[i]){
        if(field === 'value') d.items[i].value = parseInt(inp.value)||0;
        else d.items[i].title = inp.value;
      }
    });
  }
  else if(b.type === 'grafico'){
    const fTitulo = document.getElementById('f-titulo');
    if(fTitulo) d.titulo = fTitulo.value;
    const fSubtitulo = document.getElementById('f-subtitulo');
    if(fSubtitulo) d.subtitulo = fSubtitulo.value;
    const fLargura = document.getElementById('f-largura');
    if(fLargura) d.largura = parseInt(fLargura.value);
    const fAltura = document.getElementById('f-altura');
    if(fAltura) d.altura = parseInt(fAltura.value);
    const fTipo = document.getElementById('f-tipo');
    if(fTipo) d.tipo = fTipo.value;
    const fColorido = document.getElementById('f-colorido');
    if(fColorido) d.colorido = fColorido.checked;
    const fStacked = document.getElementById('f-stacked');
    if(fStacked) d.stacked = fStacked.checked;
    const fEixoX = document.getElementById('f-eixox');
    if(fEixoX){
      const val = fEixoX.value.trim();
      if(!val.match(/^\d+\s*-\s*\d+$/)){
        d.eixoX = val.split(',').map(s=>s.trim()).filter(s=>s);
      } else {
        const match = val.match(/^(\d+)\s*-\s*(\d+)$/);
        if(match){
          const start = parseInt(match[1]);
          const end = parseInt(match[2]);
          const tipoSelect = document.getElementById('f-range-tipo');
          const tipo = tipoSelect ? tipoSelect.value : 'numeros';
          const labels = [];
          const nomes = {
            meses: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
            dias: ['Dia 1','Dia 2','Dia 3','Dia 4','Dia 5','Dia 6','Dia 7','Dia 8','Dia 9','Dia 10','Dia 11','Dia 12'],
            anos: ['2020','2021','2022','2023','2024','2025','2026','2027','2028','2029','2030','2031']
          };
          for(let i=start; i<=end; i++){
            if(tipo === 'meses' && i-1 < nomes.meses.length) labels.push(nomes.meses[i-1]);
            else if(tipo === 'dias' && i-1 < nomes.dias.length) labels.push(nomes.dias[i-1]);
            else if(tipo === 'anos' && i-1 < nomes.anos.length) labels.push(nomes.anos[i-1]);
            else labels.push(String(i));
          }
          d.eixoX = labels;
        }
      }
    }
    document.querySelectorAll('#series-container input').forEach(inp=>{
      const i = parseInt(inp.dataset.serie);
      const field = inp.dataset.field;
      if(!isNaN(i) && field && d.series[i]){
        if(field === 'valores') d.series[i].valores = inp.value;
        else if(field === 'nome') d.series[i].nome = inp.value;
        else if(field === 'semFill') d.series[i].semFill = inp.checked;
      }
    });
    document.querySelectorAll('#series-container select[data-field="tipoSerie"]').forEach(sel=>{
      const i = parseInt(sel.dataset.serie);
      if(!isNaN(i) && d.series[i]){
        d.series[i].isLinha = sel.value === 'linha';
      }
    });
    const fPremissas = document.getElementById('f-premissas');
    if(fPremissas) d.premissas = fPremissas.value;
  }
  else if(b.type === 'tabela'){
    const fTitulo = document.getElementById('f-titulo');
    if(fTitulo) d.titulo = fTitulo.value;
    
    const fPremissas = document.getElementById('f-premissas');
    if(fPremissas) d.premissas = fPremissas.value;
    
    syncTabelaDoDOM(); // Sync nomes, tipos e dados do DOM
    
    document.querySelectorAll('#modalBody input[data-row][data-col]').forEach(inp=>{
      const ri = parseInt(inp.dataset.row);
      const ci = parseInt(inp.dataset.col);
      if(!isNaN(ri) && !isNaN(ci) && d.rows[ri] && d.rows[ri][ci] !== undefined){
        d.rows[ri][ci] = inp.value;
      }
    });
  }
}

function salvarBloco(){
  salvarBlocoInterno();
  fecharModal();
  renderPreview();
}

function extrairHTML(){
  const com = comunicados.find(c => c.id === selId);
  const styleContent = document.querySelector('style')?.textContent || '';
  
  // Garantir que todos os gráficos são renderizados
  renderizarTodosGraficos();
  
  // Pequeno delay para garantir que canvas foi preenchido
  setTimeout(() => {
    const a4Html = document.querySelector('.a4')?.outerHTML || '';
    
    // Criar documento temporário para modificar canvas
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = a4Html;
    
    // Converter todos os canvas em imagens
    tempDiv.querySelectorAll('canvas').forEach((canvas, idx) => {
      // Verificar se canvas tem conteúdo
      const ctx = canvas.getContext('2d');
      if(ctx) {
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        img.style.width = canvas.style.width || '100%';
        img.style.height = canvas.style.height || 'auto';
        img.style.display = 'block';
        canvas.parentNode.replaceChild(img, canvas);
      }
    });
    
    const modifiedHtml = tempDiv.innerHTML;
    
    const doc = document.implementation.createHTMLDocument('Dashboard');
    doc.head.innerHTML = `<meta charset="UTF-8"><title>Dashboard</title><style>${styleContent}</style>`;
    doc.body.innerHTML = modifiedHtml;
    doc.body.style.margin = '20px';
    doc.body.style.display = 'flex';
    doc.body.style.justifyContent = 'center';
    doc.body.style.background = '#f3f5f9';
    
    const dataObj = {
      blocks: com?.blocks || []
    };
    
    const scriptEl = doc.createElement('script');
    scriptEl.type = 'application/json';
    scriptEl.id = 'dados-dashboard';
    scriptEl.textContent = JSON.stringify(dataObj);
    doc.body.appendChild(scriptEl);
    
    const fullHtml = doc.documentElement.outerHTML;
    const blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'dashboard.html';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }, 300);
}

function baixarJPEG(){
  if(typeof html2canvas === 'undefined') {
    alert('Erro: Biblioteca html2canvas não carregou. Verifique sua conexão.');
    return;
  }
  
  const a4 = document.querySelector('.a4');
  if(!a4) {
    alert('Nenhum bloco para exportar');
    return;
  }
  
  document.querySelectorAll('canvas').forEach(canvas => {
    if(!canvas.width || !canvas.height) {
      const parent = canvas.parentElement;
      canvas.width = parent?.offsetWidth || 800;
      canvas.height = canvas.getAttribute('data-height') || 300;
    }
  });
  
  html2canvas(a4, {
    scale: 2,
    backgroundColor: '#ffffff',
    allowTaint: true,
    useCORS: true
  }).then(canvas => {
    const link = document.createElement('a');
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.download = 'dashboard.jpeg';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }).catch(err => {
    alert('Erro ao gerar imagem: ' + err.message);
  });
}
